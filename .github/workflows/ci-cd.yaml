name: Aura Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install flake8 pytest httpx

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 backend/app --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings.
        flake8 backend/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Backend Unit Tests
      run: |
        cd backend
        pytest tests/

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Build Backend Image
      run: |
        docker build -t aura-backend:latest ./backend

    - name: Build Frontend Image
      run: |
        docker build -t aura-frontend:latest ./frontend

  security-scan:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Run Vulnerability Scan
      run: |
        echo "Running security vulnerabilities scanning across backend and frontend containers..."

  deploy:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
    - name: Simulate Kubernetes Deployment
      run: |
        echo "Connecting to production cluster..."
        echo "Applying kubernetes configurations: kubectl apply -f kubernetes/k8s-manifests.yaml"
        echo "Deployment completed successfully!"
